<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Mosh - Pixelated Music Suggester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="canvas-container"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  
  <header>
    <h1 class="glitch" data-text="MUSIC MOSH">MUSIC MOSH</h1>
    <p class="subtitle">Intricate Pixelated Music Discovery</p>
  </header>

  <main>
    <section class="controls">
      <div class="filter-group">
        <label for="mood">MOOD</label>
        <select id="mood">
          <option value="">ANY</option>
          <option value="retro">RETRO</option>
          <option value="chill">CHILL</option>
          <option value="energetic">ENERGETIC</option>
          <option value="melancholic">MELANCHOLIC</option>
          <option value="ethereal">ETHEREAL</option>
          <option value="happy">HAPPY</option>
          <option value="sad">SAD</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="genre">GENRE</label>
        <select id="genre">
          <option value="">ANY</option>
          <option value="Synthwave">SYNTHWAVE</option>
          <option value="Lo-Fi">LO-FI</option>
          <option value="Indie Rock">INDIE ROCK</option>
          <option value="Space Ambient">SPACE AMBIENT</option>
          <option value="synthpop">SYNTHPOP</option>
          <option value="disco">DISCO</option>
          <option value="indie">INDIE</option>
          <option value="pop">POP</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="architecture">ARCHITECTURE</label>
        <select id="architecture">
          <option value="toon">TOON (Preferred)</option>
          <option value="json">JSON</option>
        </select>
      </div>

      <button id="suggest-btn" class="pixel-btn">
        <span class="btn-text">FIND TRACK</span>
        <span class="btn-particles"></span>
      </button>
    </section>

    <section class="result-container" id="result-container">
      <div class="card" id="track-card">
        <div class="card-header">
          <span class="source-badge" id="source-badge">TOON</span>
          <span class="arch-badge" id="arch-badge">ARCH: TOON</span>
        </div>
        <div class="card-body">
          <h2 class="track-title" id="track-title">PRESS FIND TRACK</h2>
          <p class="track-artist" id="track-artist">Waiting for input...</p>
        </div>
        <div class="card-footer">
          <a href="#" target="_blank" rel="noopener" class="play-btn" id="play-btn">
            <span class="icon">▶</span>
            <span>PLAY NOW</span>
          </a>
        </div>
      </div>
    </section>

    <section class="stats-bar">
      <div class="stat">
        <span class="stat-label">TRACKS</span>
        <span class="stat-value" id="track-count">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">TOON</span>
        <span class="stat-value" id="toon-count">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">JSON</span>
        <span class="stat-value" id="json-count">0</span>
      </div>
    </section>
  </main>

  <footer>
    <p>Apache License 2.0 | Built with Three.js + Anime.js</p>
    <p>Templates inspired by 21.dev and Pinterest aesthetics</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
